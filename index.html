<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Txoko Magia</title>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-size:32px;text-align:center;font-family:Arial;">

<div id="mensaje"></div>

<script>
let contador = localStorage.getItem("contador") || 0;
let modo = localStorage.getItem("modo") || 1;

contador++;

let mensaje = "";

if (modo == 1) {
    if (contador == 1) mensaje = "Este no es tu vino";
    if (contador == 2) mensaje = "Este te estaba esperando";
    if (contador == 3) {
        mensaje = "Casi… pero no";
        contador = 0;
        modo = 2;
    }
} else {
    if (contador == 1) mensaje = "Este no es tu vino";
    if (contador == 2) mensaje = "Casi… pero no";
    if (contador == 3) {
        mensaje = "Este te estaba esperando";
        contador = 0;
        modo = 1;
    }
}

localStorage.setItem("contador", contador);
localStorage.setItem("modo", modo);

document.getElementById("mensaje").innerText = mensaje;
</script>

</body>
</html>
